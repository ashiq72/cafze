services:
  cafze:
    container_name: cafze-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.cafze.com}
        NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-free4mood}
    ports:
      - "${CAFZE_PORT:-3011}:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
